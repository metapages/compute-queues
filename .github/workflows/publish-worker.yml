name: Publish worker binary & container images

on:
  # this section can be removed after testing is done
  pull_request:
    branches:
      - 'build-artifacts'
  push:
    branches:
      - 'build-artifacts'
    # paths:
    #   - 'app/worker/src/**'

jobs:
  release-worker-binary:
    name: Build and release worker binary
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Setup Just CLI
        uses: extractions/setup-just@v1
        with:
          just-version: '1.35.0'

      - name: Install deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: '1.46.3'

      - name: Build and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: just app/worker/publish-binary

  publish-worker-images:
    name: Build and push worker container images
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Setup Just CLI
        uses: extractions/setup-just@v1
        with:
          just-version: '1.35.0'

      - name: Build and release
        run: just app/worker/publish-docker-images
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
